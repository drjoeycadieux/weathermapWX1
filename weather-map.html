<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>GFS Weather Map</title>
    <!-- Mapbox GL JS -->
    <script src="https://api.tiles.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
    <link href="https://api.tiles.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet" />
    <!-- Deck.gl -->
    <script src="https://unpkg.com/deck.gl@^9.0.0/dist.min.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="status" style="position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 12px; border-radius: 5px; font-size: 12px; z-index: 1000; max-width: 300px;">
        <strong>GFS Weather Map</strong><br/>
        <small id="status-text">Loading...</small>
    </div>
    <div style="position: absolute; top: 80px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 5px; color: white; max-width: 280px;">
        <div style="font-size: 11px; margin-bottom: 8px;">
            <label style="display: block; margin-bottom: 6px;">
                <strong>Choose Location:</strong>
            </label>
            <select id="location-select" style="width: 100%; padding: 6px; margin-bottom: 8px; background: #333; color: white; border: 1px solid #666; border-radius: 3px;">
                <option value="40.71,-74.01">📍 New York (Real NOAA Data)</option>
                <option value="41.88,-87.63">📍 Chicago (Real NOAA Data)</option>
                <option value="33.75,-84.39">📍 Atlanta (Real NOAA Data)</option>
                <option value="47.61,-122.33">📍 Seattle (Real NOAA Data)</option>
                <option value="45.5,-73.5">📍 Montreal (Demo Data)</option>
                <option value="35.09,-106.65">📍 Albuquerque (Real NOAA Data)</option>
                <option value="custom">⚙️ Custom Location...</option>
            </select>
            <div id="custom-location" style="display: none; margin-bottom: 8px;">
                <input type="number" id="lat-input" placeholder="Latitude" step="0.01" style="width: 48%; padding: 4px; margin-right: 4%; background: #333; color: white; border: 1px solid #666; border-radius: 3px;">
                <input type="number" id="lon-input" placeholder="Longitude" step="0.01" style="width: 48%; padding: 4px; background: #333; color: white; border: 1px solid #666; border-radius: 3px;">
            </div>
        </div>
        <button id="load-real-btn" style="width: 100%; padding: 6px; background: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; margin-bottom: 6px; font-size: 11px;">
            📡 Load Real Weather
        </button>
        <button id="demo-btn" style="width: 100%; padding: 6px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 11px;">
            📊 Load Demo Data
        </button>
    </div>
    <script>
        const { MapboxOverlay, GridLayer } = deck;
        
        // Status display function
        function updateStatus(message, isError = false) {
            const statusText = document.getElementById('status-text');
            statusText.textContent = message;
            if (isError) {
                statusText.parentElement.style.background = 'rgba(220,53,69,0.9)';
            } else {
                statusText.parentElement.style.background = 'rgba(0,0,0,0.7)';
            }
        }

        // Initialize Mapbox
        mapboxgl.accessToken = 'pk.eyJ1Ijoiam9leWNyZWF0b3IiLCJhIjoiY21xZWNmcjA1MWFrZDJ5cG93cG8wc3NvcCJ9.Ky4Z1kNOF5MKuYh7AbbodQ';
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: [-73.56, 45.50], // Montreal
            zoom: 5
        });

        let currentOverlay = null;
        let currentLocation = { lat: 45.5, lon: -73.5 };

        // Location selector handler
        document.getElementById('location-select').addEventListener('change', (e) => {
            const customDiv = document.getElementById('custom-location');
            if (e.target.value === 'custom') {
                customDiv.style.display = 'block';
                // Default to current location
                document.getElementById('lat-input').value = currentLocation.lat;
                document.getElementById('lon-input').value = currentLocation.lon;
            } else {
                customDiv.style.display = 'none';
                const [lat, lon] = e.target.value.split(',');
                currentLocation = { lat: parseFloat(lat), lon: parseFloat(lon) };
                updateMapCenter(parseFloat(lat), parseFloat(lon));
            }
        });

        // Update map center and load data
        function updateMapCenter(lat, lon) {
            map.flyTo({
                center: [lon, lat],
                zoom: 6,
                duration: 2000
            });
        }

        // Load weather data from backend API
        async function loadWeatherData(lat, lon, useDemo = false) {
            try {
                updateStatus('Fetching weather data...');
                
                const apiUrl = useDemo 
                    ? '/api/gfs-data-demo' 
                    : `/api/gfs-data?lat=${lat}&lon=${lon}`;
                
                console.log('Fetching from:', apiUrl);
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    let errorMsg = `HTTP error! status: ${response.status}`;
                    try {
                        const error = await response.json();
                        errorMsg = error.message || error.details || errorMsg;
                    } catch (e) {
                        // Response wasn't JSON
                    }
                    throw new Error(errorMsg);
                }
                
                const data = await response.json();
                console.log('Weather data received:', data);
                updateStatus(`Data loaded: ${data.model || 'Unknown'}`);

                // Handle different data formats
                let dataArray = data;
                if (data.data && Array.isArray(data.data)) {
                    dataArray = data.data;
                } else if (!Array.isArray(data)) {
                    dataArray = [data];
                }

                // Only add overlay if we have valid data
                if (dataArray && dataArray.length > 0) {
                    // Remove old overlay if it exists
                    if (currentOverlay) {
                        map.removeControl(currentOverlay);
                    }

                    currentOverlay = new MapboxOverlay({
                        layers: [
                            new GridLayer({
                                id: 'gfs-weather-layer',
                                data: dataArray,
                                getPosition: d => [d.lon || d.longitude || 0, d.lat || d.latitude || 0],
                                getColorValue: d => d.value || d.temperature || 0,
                                getElevationValue: d => d.value || d.temperature || 0,
                                cellSize: 20000, 
                                extruded: true, 
                                colorRange: [
                                    [30, 60, 200],    // Deep blue (cold)
                                    [100, 150, 255],  // Light blue
                                    [100, 255, 100],  // Green (mild)
                                    [255, 255, 100],  // Yellow (warm)
                                    [255, 150, 0],    // Orange (hot)
                                    [255, 50, 0]      // Red (very hot)
                                ]
                            })
                        ]
                    });

                    map.addControl(currentOverlay);
                } else {
                    throw new Error('No valid data received from API');
                }
            } catch (error) {
                console.error('Data load error:', error);
                updateStatus(`Error: ${error.message}`, true);
            }
        }

        // Button handlers
        document.getElementById('load-real-btn').addEventListener('click', () => {
            const select = document.getElementById('location-select');
            if (select.value === 'custom') {
                const lat = parseFloat(document.getElementById('lat-input').value);
                const lon = parseFloat(document.getElementById('lon-input').value);
                if (!isNaN(lat) && !isNaN(lon)) {
                    currentLocation = { lat, lon };
                    updateMapCenter(lat, lon);
                    loadWeatherData(lat, lon, false);
                } else {
                    updateStatus('Please enter valid latitude and longitude', true);
                }
            } else {
                const [lat, lon] = select.value.split(',');
                loadWeatherData(parseFloat(lat), parseFloat(lon), false);
            }
        });

        document.getElementById('demo-btn').addEventListener('click', () => {
            loadWeatherData(currentLocation.lat, currentLocation.lon, true);
        });

        map.on('load', () => {
            // Load demo data on startup
            loadWeatherData(currentLocation.lat, currentLocation.lon, true);
        });
    </script>
</body>
</html>
