<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Severe Storms Media - Dashboard</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.5.0/mapbox-gl.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
    background:#0f172a;
}

#map{
    position:absolute;
    inset:0;
}

.header{
    position:absolute;
    top:12px;
    left:12px;
    right:12px;
    height:60px;

    z-index:1000;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 20px;

    background:rgba(8,12,20,.92);
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.08);
    border-radius:14px;

    color:white;
}

.logo{
    font-size:22px;
    font-weight:700;
}

.subtitle{
    font-size:12px;
    color:#7dd3fc;
}

.sidebar{
    position:absolute;
    top:90px;
    left:12px;

    width:300px;
    max-height: calc(100vh - 120px);
    overflow-y: auto;

    z-index:1000;

    background:rgba(8,12,20,.92);
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.08);
    border-radius:14px;

    padding:18px;

    color:white;
}

.sidebar::-webkit-scrollbar {
    width: 6px;
}
.sidebar::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
}

.section{
    margin-bottom:20px;
}

.section-title{
    font-size:14px;
    margin-bottom:12px;
    color:#38bdf8;
    font-weight:600;
}

button{
    width:100%;
    padding:10px;
    margin-bottom:8px;

    border:none;
    border-radius:8px;

    background:#1e293b;
    color:white;

    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#334155;
}

input[type=range]{
    width:100%;
}

.status{
    position:absolute;
    bottom:15px;
    right:15px;

    z-index:1000;

    background:rgba(0,0,0,.65);

    color:white;

    padding:10px 14px;
    border-radius:10px;

    font-size:12px;
}

.legend{
    margin-top:10px;
    display:grid;
    gap:6px;
}

.legend-item{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
}

.color-box{
    width:16px;
    height:16px;
    border-radius:3px;
}

/* Custom styled popup elements to integrate with the layout's dark palette */
.mapboxgl-popup-content {
    background: rgba(15, 23, 42, 0.96) !important;
    color: #f8fafc !important;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 10px;
    padding: 14px !important;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.6);
    max-width: 280px;
}
.mapboxgl-popup-anchor-top .mapboxgl-popup-tip { border-bottom-color: rgba(15, 23, 42, 0.96) !important; }
.mapboxgl-popup-anchor-bottom .mapboxgl-popup-tip { border-top-color: rgba(15, 23, 42, 0.96) !important; }
.mapboxgl-popup-anchor-left .mapboxgl-popup-tip { border-right-color: rgba(15, 23, 42, 0.96) !important; }
.mapboxgl-popup-anchor-right .mapboxgl-popup-tip { border-left-color: rgba(15, 23, 42, 0.96) !important; }
.mapboxgl-popup-close-button {
    color: #94a3b8 !important;
    padding: 4px 8px !important;
    font-size: 14px;
}
.mapboxgl-popup-close-button:hover {
    background: transparent !important;
    color: #fff !important;
}

label {
    display: block;
    font-size: 12px;
    margin-bottom: 4px;
    color: #94a3b8;
}

</style>
</head>
<body>

<div id="map"></div>

<div class="header">
    <div>
        <div class="logo">Severe Storms Media - Dashboard</div>
        <div class="subtitle">
            Mapbox + NEXRAD + SPC Outlooks + ECCC Alerts
        </div>
    </div>

    <div id="timeLabel"></div>
</div>

<div class="sidebar">

    <div class="section">
        <div class="section-title">
            US Radar Controls (IEM)
        </div>
        <label>Radar Opacity</label>
        <input
            type="range"
            id="opacitySlider"
            min="0"
            max="100"
            value="75"
        >
        <div id="opacityValue">75%</div>
    </div>

    <div class="section">
        <div class="section-title">
            Canada Weather Alerts (ECCC)
        </div>
        <label>Alerts Opacity</label>
        <input
            type="range"
            id="canadaAlertsSlider"
            min="0"
            max="100"
            value="60"
        >
        <div id="canadaAlertsValue">60%</div>
    </div>

    <div class="section">
        <div class="section-title">
            SPC Outlooks
        </div>
        <button id="day1Btn">Load Day 1 Outlook</button>
        <button id="day2Btn">Load Day 2 Outlook</button>
        <button id="day3Btn">Load Day 3 Outlook</button>
        <button id="clearBtn">Clear Outlook</button>
    </div>

    <div class="section">
        <div class="section-title">
            SPC Outlook Legend
        </div>
        <div class="legend">
            <div class="legend-item">
                <div class="color-box" style="background:#55ff55"></div>TSTM
            </div>
            <div class="legend-item">
                <div class="color-box" style="background:#00aaff"></div>MRGL
            </div>
            <div class="legend-item">
                <div class="color-box" style="background:#ffff00"></div>SLGT
            </div>
            <div class="legend-item">
                <div class="color-box" style="background:#ff9900"></div>ENH
            </div>
            <div class="legend-item">
                <div class="color-box" style="background:#ff0000"></div>MDT
            </div>
            <div class="legend-item">
                <div class="color-box" style="background:#ff00ff"></div>HIGH
            </div>
        </div>
    </div>

</div>

<div class="status">
    Severe Storms Media - Transnational Hazard Tracking
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.5.0/mapbox-gl.js"></script>

<script>

mapboxgl.accessToken = "#";

const map = new mapboxgl.Map({
    container: "map",
    style: "mapbox://styles/mapbox/satellite-streets-v12",
    center: [-85.0, 46.0], // Centered closer to the US/Canada border lines
    zoom: 4.5,
    antialias:true
});

map.addControl(
    new mapboxgl.NavigationControl(),
    "top-right"
);

const SPC_URLS = {
    day1: "https://www.spc.noaa.gov/products/outlook/day1otlk_cat.nolyr.geojson",
    day2: "https://www.spc.noaa.gov/products/outlook/day2otlk_cat.nolyr.geojson",
    day3: "https://www.spc.noaa.gov/products/outlook/day3otlk_cat.nolyr.geojson"
};

const OUTLOOK_DESCRIPTIONS = {
    "TSTM": "<strong style='color:#55ff55;'>Thunderstorms</strong><br>General or non-severe thunderstorms are expected. Lightning, flooding, and small hail threats exist.",
    "MRGL": "<strong style='color:#38bdf8;'>Marginal Risk (Level 1)</strong><br>Isolated severe thunderstorms are possible. Limited in organization, duration, or coverage area.",
    "SLGT": "<strong style='color:#eab308;'>Slight Risk (Level 2)</strong><br>Scattered severe storms are possible. Short-lived or localized activity, but isolated intense structures remain possible.",
    "ENH":  "<strong style='color:#f97316;'>Enhanced Risk (Level 3)</strong><br>Numerous severe storms are possible. More persistent and widespread hazards with several intense convective instances.",
    "MDT":  "<strong style='color:#ef4444;'>Moderate Risk (Level 4)</strong><br>Widespread severe storms are likely. Expect long-lived, intense severe weather events including significant tornadoes or wind damage.",
    "HIGH": "<strong style='color:#ec4899;'>High Risk (Level 5)</strong><br>Widespread severe storms are expected. Particularly dangerous, long-lived outbreaks featuring destructive tornadoes or violent derecho winds."
};

let currentPopup = null;

map.on("load",()=>{

    // 1. Existing US NEXRAD Radar Source
    map.addSource("radar",{
        type:"raster",
        tiles:[
            "https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/nexrad-n0q-900913/{z}/{x}/{y}.png"
        ],
        tileSize:256
    });

    map.addLayer({
        id:"radar-layer",
        type:"raster",
        source:"radar",
        paint:{
            "raster-opacity":0.75
        }
    });

    // 2. ENVIRONMENT CANADA LIVE WEATHER ALERTS INTEGRATION (MSC GeoMet)
    // Uses the official 'Current-Alerts' live vector layer parsed via standard WMS tile requests
    map.addSource("canada-alerts", {
        type: "raster",
        tiles: [
            "https://geo.weather.gc.ca/geomet?SERVICE=WMS&VERSION=1.3.0&REQUEST=GetMap&BBOX={bbox-epsg-3857}&CRS=EPSG:3857&WIDTH=256&HEIGHT=256&LAYERS=Current-Alerts&STYLES=&FORMAT=image/png&TRANSPARENT=TRUE"
        ],
        tileSize: 256
    });

    map.addLayer({
        id: "canada-alerts-layer",
        type: "raster",
        source: "canada-alerts",
        paint: {
            "raster-opacity": 0.60
        }
    });

    // Handle clicks within the boundary of an SPC Outlook polygon
    map.on("click", "spc-fill", (e) => {
        if (!e.features.length) return;

        const label = e.features[0].properties.LABEL;
        const infoHtml = OUTLOOK_DESCRIPTIONS[label] || `<strong>${label}</strong><br>Convective severe weather forecast layer area.`;

        openPopup(e.lngLat, infoHtml);
    });

    map.on("mouseenter", "spc-fill", () => {
        map.getCanvas().style.cursor = "pointer";
    });

    map.on("mouseleave", "spc-fill", () => {
        map.getCanvas().style.cursor = "";
    });

});

// Helper function to handle popups seamlessly
function openPopup(lngLat, contentHtml) {
    if (currentPopup) currentPopup.remove();

    currentPopup = new mapboxgl.Popup({ closeOnClick: true })
        .setLngLat(lngLat)
        .setHTML(`<div style="font-size: 13px; line-height: 1.45;">${contentHtml}</div>`)
        .addTo(map);
}

async function loadSPC(day){
    try{
        clearSPC();

        const response = await fetch(SPC_URLS[day]);
        const geojson = await response.json();

        map.addSource("spc",{
            type:"geojson",
            data:geojson
        });

        map.addLayer({
            id:"spc-fill",
            type:"fill",
            source:"spc",
            paint:{
                "fill-color":[
                    "match",
                    ["get","LABEL"],
                    "TSTM","#55ff55",
                    "MRGL","#00aaff",
                    "SLGT","#ffff00",
                    "ENH","#ff9900",
                    "MDT","#ff0000",
                    "HIGH","#ff00ff",
                    "#cccccc"
                ],
                "fill-opacity":0.25
            }
        });

        map.addLayer({
            id:"spc-line",
            type:"line",
            source:"spc",
            paint:{
                "line-color":[
                    "match",
                    ["get","LABEL"],
                    "TSTM","#55ff55",
                    "MRGL","#00aaff",
                    "SLGT","#ffff00",
                    "ENH","#ff9900",
                    "MDT","#ff0000",
                    "HIGH","#ff00ff",
                    "#ffffff"
                ],
                "line-width":3
            }
        });

    }catch(err){
        console.error(err);
        alert("Unable to load SPC outlook.");
    }
}

function clearSPC(){
    if (currentPopup) {
        currentPopup.remove();
        currentPopup = null;
    }
    if(map.getLayer("spc-fill")) map.removeLayer("spc-fill");
    if(map.getLayer("spc-line")) map.removeLayer("spc-line");
    if(map.getSource("spc")) map.removeSource("spc");
}

document.getElementById("day1Btn").addEventListener("click",()=>loadSPC("day1"));
document.getElementById("day2Btn").addEventListener("click",()=>loadSPC("day2"));
document.getElementById("day3Btn").addEventListener("click",()=>loadSPC("day3"));
document.getElementById("clearBtn").addEventListener("click",clearSPC);

// US Radar Slider Controls
const slider = document.getElementById("opacitySlider");
const opacityText = document.getElementById("opacityValue");

slider.addEventListener("input",()=>{
    const opacity = slider.value / 100;
    opacityText.textContent = slider.value + "%";
    if(map.getLayer("radar-layer")){
        map.setPaintProperty("radar-layer", "raster-opacity", opacity);
    }
});

// Canada Alerts Slider Controls
const canadaAlertsSlider = document.getElementById("canadaAlertsSlider");
const canadaAlertsText = document.getElementById("canadaAlertsValue");

canadaAlertsSlider.addEventListener("input",()=>{
    const opacity = canadaAlertsSlider.value / 100;
    canadaAlertsText.textContent = canadaAlertsSlider.value + "%";
    if(map.getLayer("canada-alerts-layer")){
        map.setPaintProperty("canada-alerts-layer", "raster-opacity", opacity);
    }
});

function updateClock(){
    const now = new Date();
    document.getElementById("timeLabel").innerText = now.toLocaleString();
}

updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
